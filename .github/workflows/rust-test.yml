name: Rust Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  native-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cargo-workspace"

      - run: cargo test -p o1-verifier-lib --features std --test native_verify
