name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cargo-workspace"
      - run: npm ci
      - run: make lint-check

  ts-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: make ts-unit-tests

  ts-e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: make build-ts
      - run: ./scripts/ts-e2e-test.sh

  rust-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cargo-workspace"
      - run: make rust-unit-tests

  rust-e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cargo-workspace"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache SP1 toolchain
        id: sp1-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.sp1
            ~/.rustup/toolchains/succinct
          key: sp1-v6.0.2-${{ runner.os }}

      - name: Install SP1 toolchain
        if: steps.sp1-cache.outputs.cache-hit != 'true'
        run: |
          curl -L https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up

      - name: Add SP1 to PATH
        run: echo "$HOME/.sp1/bin" >> $GITHUB_PATH

      - run: npm ci
      - run: ./scripts/rust-e2e-test.sh
