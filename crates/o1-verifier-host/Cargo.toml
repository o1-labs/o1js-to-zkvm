[package]
name = "o1-verifier-host"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "o1zkvm"
path = "src/main.rs"

[dependencies]
o1-pickles-verifier = { path = "../o1-pickles-verifier", features = ["std"] }
sp1-sdk = { workspace = true }
serde_json = { version = "1" }
rmp-serde = "1"
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }

[build-dependencies]
sp1-build = { workspace = true }
