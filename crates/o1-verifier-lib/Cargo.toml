[package]
name = "o1-verifier-lib"
version = "0.1.0"
edition = "2021"

[features]
std = ["serde_json", "base64", "ark-ff", "ark-poly", "sexp"]

[dependencies]
kimchi = { workspace = true }
poly-commitment = { workspace = true }
mina-curves = { workspace = true }
mina-poseidon = { workspace = true }
groupmap = { workspace = true }
serde = { workspace = true }
rmp-serde = { version = "1", default-features = false }
ark-serialize = { version = "0.5", default-features = false }
rand = { version = "0.8", default-features = false }

# std-only deps for circuit JSON parsing
serde_json = { version = "1", optional = true }
base64 = { version = "0.13", optional = true }
ark-ff = { version = "0.5", optional = true }
ark-poly = { version = "0.5", optional = true }
sexp = { version = "1", optional = true }

[dev-dependencies]
rand = "0.8"
rmp-serde = "1"

[[test]]
name = "native_verify"
required-features = ["std"]

[[test]]
name = "simple_chain_pickles"
required-features = ["std"]
